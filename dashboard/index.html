<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Argus — Satellite TE Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0e17;--card:#111827;--border:#1e293b;--text:#e2e8f0;--dim:#64748b;--muted:#475569;--orange:#f97316;--cyan:#22d3ee;--green:#34d399;--red:#f87171;--purple:#a78bfa}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
  .m{font-family:'JetBrains Mono',monospace}
  .topbar{background:linear-gradient(135deg,#0f172a,#1e1b4b);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .topbar h1{font-size:20px;font-weight:700}.topbar h1 span{color:var(--orange)}
  .pills{display:flex;gap:24px;font-size:12px;color:var(--dim)}.pills b{color:var(--text);font-size:14px}
  .ebar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:16px;position:sticky;top:52px;z-index:99}
  .ebar label{font-size:12px;color:var(--dim)}
  .ebar input[type=range]{flex:1;accent-color:var(--orange)}
  .ebar .ev{font-size:22px;font-weight:700;color:var(--orange);min-width:36px;text-align:center}
  .g{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:20px 28px;max-width:1600px;margin:0 auto}
  .c{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px}
  .c h3{font-size:12px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px}
  .sr{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;grid-column:1/-1}
  .sc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
  .sc .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .sc .n{font-size:28px;font-weight:700;margin-top:4px}
  .sc .s{font-size:11px;color:var(--dim);margin-top:2px}
  .cw{position:relative;height:280px}.cw canvas{width:100%!important;height:100%!important}
  .tabs{display:flex;gap:6px;margin-bottom:10px}
  .tb{font-size:11px;padding:5px 12px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer}.tb.on{border-color:var(--orange);color:var(--orange);background:rgba(249,115,22,.08)}
  .hb{position:relative;overflow:auto;max-height:500px}
  #tip{position:absolute;display:none;pointer-events:none;background:#1e293b;border:1px solid #334155;border-radius:6px;padding:6px 10px;font-size:11px;white-space:nowrap;z-index:10}
</style>
</head>
<body>
<div id="app" class="m" style="display:flex;align-items:center;justify-content:center;height:60vh;color:var(--dim)">Loading…</div>
<script>
let D,ch={},ep=0,strat='greedy_2';

async function boot(){
  try{D=await(await fetch('data.json')).json();build()}
  catch(e){document.getElementById('app').textContent='data.json not found'}
}

function build(){
  const c=D.config, mx=c.num_epochs-1;
  // Determine dynamic height for dest coverage chart
  const destH = c.n_dests > 15 ? Math.max(280, c.n_dests * 22) : 280;
  const appEl=document.getElementById('app');
  appEl.removeAttribute('style');  // Clear loading-state inline styles
  appEl.className='';
  appEl.innerHTML=`
  <div class="topbar"><h1 class="m"><span>◆</span> ARGUS</h1>
  <div class="pills m"><div>Epochs <b>${c.num_epochs}</b></div><div>PoPs <b>${c.n_pops}</b></div><div>Dests <b>${c.n_dests}</b></div></div></div>
  <div class="ebar m"><label>EPOCH</label><input type="range" id="sl" min="0" max="${mx}" value="0"><span class="ev" id="ev">0</span></div>
  <div class="g">
    <div class="sr">
      <div class="sc"><div class="l m">Baseline</div><div class="n m" style="color:var(--red)" id="s0">—</div></div>
      <div class="sc"><div class="l m">Greedy</div><div class="n m" style="color:var(--green)" id="s1">—</div></div>
      <div class="sc"><div class="l m">Saved</div><div class="n m" id="s2">—</div></div>
      <div class="sc"><div class="l m">Cache</div><div class="n m" style="color:var(--purple)" id="s3">—</div><div class="s" id="s3s"></div></div>
      <div class="sc"><div class="l m">Flows</div><div class="n m" style="color:var(--orange)" id="s4">—</div></div>
    </div>
    <div class="c"><h3>E2E Latency</h3><div class="cw"><canvas id="cL"></canvas></div></div>
    <div class="c"><h3>Segment Breakdown</h3><div class="tabs" id="tS"></div><div class="cw"><canvas id="cS"></canvas></div></div>
    <div class="c"><h3>PoP × Dest Cache</h3><div class="tabs" id="tH"></div><div class="hb"><canvas id="cH"></canvas><div id="tip"></div></div></div>
    <div class="c"><h3>Per-Dest Coverage</h3><div class="cw" style="height:${destH}px"><canvas id="cD"></canvas></div></div>
  </div>`;
  initLat(); initSeg(); initDst(); drawHM(); updAll(); mkTabs();
  document.getElementById('sl').oninput=function(){ep=+this.value;document.getElementById('ev').textContent=ep;updAll()};
}

function updAll(){updStats();updLat();updSeg();drawHM();updDst()}

function updStats(){
  const b=D.strategies.nearest_pop?.epochs[ep], g=D.strategies[strat]?.epochs[ep];
  if(!b||!g)return;
  document.getElementById('s0').textContent=b.avg_rtt.toFixed(1)+'ms';
  document.getElementById('s1').textContent=g.avg_rtt.toFixed(1)+'ms';
  const d=b.avg_rtt-g.avg_rtt;
  document.getElementById('s2').textContent=(d>0?'+':'')+d.toFixed(1)+'ms';
  // Color "Saved" green when positive (improvement), red when negative (regression)
  document.getElementById('s2').style.color=d>=0?'var(--green)':'var(--red)';
  document.getElementById('s3').textContent=g.gk_size ?? '—';
  document.getElementById('s3s').textContent='/ '+D.config.n_pops*D.config.n_dests;
  document.getElementById('s4').textContent=g.n_flows != null ? g.n_flows : '—';
}

/* ── Latency chart ── */
function initLat(){
  const ctx=document.getElementById('cL');
  const N=D.config.num_epochs;
  const labels=Array.from({length:N},(_,i)=>i);
  const datasets=Object.keys(D.strategies).map(k=>{
    const col=kclr(k);
    // Initially show data up to current epoch, null for future
    const allData=D.strategies[k].epochs.map(e=>e.avg_rtt);
    return{label:klbl(k),data:allData.map((v,i)=>i<=ep?v:null),
      _fullData:allData,
      borderColor:col,borderWidth:2,pointRadius:3,pointHoverRadius:5,
      tension:.3,fill:false,spanGaps:false};
  });
  const baseOpts=copts('RTT (ms)',true);
  ch.lat=new Chart(ctx,{type:'line',data:{labels,datasets},options:{
    ...baseOpts,
    plugins:{
      ...baseOpts.plugins,
      annotation:{annotations:{
        epochLine:{type:'line',xMin:ep,xMax:ep,borderColor:'rgba(249,115,22,0.5)',borderWidth:2,borderDash:[4,4]}
      }}
    }
  }});
}

function updLat(){
  if(!ch.lat)return;
  ch.lat.data.datasets.forEach(ds=>{
    // Clip data beyond current epoch to null so line segments don't render
    if(ds._fullData){
      ds.data=ds._fullData.map((v,i)=>i<=ep?v:null);
    }
  });
  // Move epoch annotation line
  if(ch.lat.options.plugins.annotation?.annotations?.epochLine){
    ch.lat.options.plugins.annotation.annotations.epochLine.xMin=ep;
    ch.lat.options.plugins.annotation.annotations.epochLine.xMax=ep;
  }
  ch.lat.update('none');
}

/* ── Segment chart ── */
function initSeg(){
  const ctx=document.getElementById('cS');
  ch.seg=new Chart(ctx,{type:'line',data:{labels:[],datasets:[
    {label:'Ground',data:[],borderColor:'#f97316',backgroundColor:'rgba(249,115,22,0.15)',fill:'origin',tension:.3,borderWidth:2,pointRadius:1,order:2},
    {label:'Satellite',data:[],borderColor:'#a78bfa',backgroundColor:'rgba(167,139,250,0.15)',fill:'origin',tension:.3,borderWidth:2,pointRadius:1,order:1},
  ]},options:copts('RTT (ms)',true)});
}

function updSeg(){
  if(!ch.seg)return;
  const data=D.strategies[strat]?.epochs||[];
  const show=data.slice(0,ep+1);
  ch.seg.data.labels=show.map((_,i)=>i);
  // Ground shows total ground delay, Satellite shows satellite delay
  // Ground is typically larger, so it renders behind
  ch.seg.data.datasets[0].data=show.map(e=>e.avg_gnd);
  ch.seg.data.datasets[1].data=show.map(e=>e.avg_sat);
  ch.seg.update('none');
}

/* ── Dest coverage ── */
function initDst(){
  const ctx=document.getElementById('cD');
  const isHorizontal=D.dest_names.length>15;
  ch.dst=new Chart(ctx,{type:'bar',data:{labels:D.dest_names,datasets:[{
    label:'PoPs cached',data:D.dest_names.map(()=>0),
    backgroundColor:'#34d39980',borderColor:'#34d399',borderWidth:1,borderRadius:3,
  }]},options:{...copts('PoPs'),indexAxis:isHorizontal?'y':'x',
    scales:{
      ...(isHorizontal?{
        x:{grid:{color:'#1e293b'},ticks:{color:'#64748b',font:{size:9}},beginAtZero:true,title:{display:true,text:'PoPs',color:'#64748b',font:{family:'JetBrains Mono',size:10}}},
        y:{grid:{color:'#1e293b'},ticks:{color:'#64748b',font:{family:'JetBrains Mono',size:9}}}
      }:{
        x:{grid:{color:'#1e293b'},ticks:{color:'#64748b',font:{size:8},maxRotation:90,minRotation:45}},
        y:{grid:{color:'#1e293b'},ticks:{color:'#64748b',font:{size:9}},beginAtZero:true,title:{display:true,text:'PoPs',color:'#64748b',font:{family:'JetBrains Mono',size:10}}}
      })
    }
  }});
}

function updDst(){
  if(!ch.dst)return;
  const cov=D.strategies[strat]?.epochs[ep]?.coverage||{};
  ch.dst.data.datasets[0].data=D.dest_names.map(d=>cov[d]||0);
  ch.dst.update('none');
}

/* ── Heatmap (canvas) ── */
function drawHM(){
  const cv=document.getElementById('cH'),tip=document.getElementById('tip');
  if(!cv)return;
  const pops=D.pop_names,dests=D.dest_names,np=pops.length,nd=dests.length;
  const padL=60;
  const cW=Math.max(14,Math.min(22,Math.floor((Math.min(cv.parentElement.clientWidth,900)-padL)/nd)));
  const cH=Math.max(10,Math.min(16,Math.floor(520/np)));
  cv.width=padL+nd*cW+4;cv.height=np*cH+4;
  const ctx=cv.getContext('2d');
  const matrix=D.coverage_matrix?.[strat]?.[ep]||[];
  const set=new Set(matrix.map(([p,d])=>`${p},${d}`));
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.font='9px JetBrains Mono';ctx.fillStyle='#64748b';ctx.textAlign='right';ctx.textBaseline='middle';
  for(let i=0;i<np;i++)ctx.fillText(pops[i],padL-6,i*cH+cH/2);
  for(let pi=0;pi<np;pi++)for(let di=0;di<nd;di++){
    ctx.fillStyle=set.has(`${pi},${di}`)?'#059669':'#1e293b';
    ctx.fillRect(padL+di*cW,pi*cH,cW-1,cH-1);
  }
  cv.onmousemove=e=>{
    const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
    const di=Math.floor((mx-padL)/cW),pi=Math.floor(my/cH);
    if(di>=0&&di<nd&&pi>=0&&pi<np){
      const ok=set.has(`${pi},${di}`);
      // Account for scroll offset of parent container
      const parent=cv.parentElement;
      tip.style.display='block';
      tip.style.left=(mx+14+parent.scrollLeft)+'px';
      tip.style.top=(my-10+parent.scrollTop)+'px';
      tip.textContent='';
      const dot=document.createElement('span');
      dot.style.color=ok?'#34d399':'#64748b';
      dot.textContent=ok?'● ':'○ ';
      tip.appendChild(dot);
      tip.appendChild(document.createTextNode(pops[pi]+' \u2192 '+dests[di]));
    }else tip.style.display='none';
  };
  cv.onmouseleave=()=>{tip.style.display='none'};
}

/* ── Tabs ── */
function mkTabs(){
  const keys=Object.keys(D.strategies).filter(k=>k!=='nearest_pop');
  ['tS','tH'].forEach(id=>{
    const c=document.getElementById(id);c.innerHTML='';
    keys.forEach(k=>{
      const b=document.createElement('button');
      b.className='tb m'+(k===strat?' on':'');b.textContent=klbl(k);
      b.dataset.key=k;
      b.onclick=()=>{strat=k;document.querySelectorAll('.tb').forEach(t=>t.classList.toggle('on',t.dataset.key===k));updAll()};
      c.appendChild(b);
    });
  });
}

/* ── Helpers ── */
function klbl(k){return{nearest_pop:'Nearest PoP',greedy_2:'Greedy (2)',greedy_10:'Greedy (10)'}[k]||k}
function kclr(k){return k==='nearest_pop'?'#f87171':k.includes('2')?'#22d3ee':'#34d399'}
function copts(yL,leg=false){return{responsive:true,maintainAspectRatio:false,animation:false,
  plugins:{legend:{display:leg,labels:{color:'#94a3b8',font:{family:'JetBrains Mono',size:10},boxWidth:10,padding:12}},
    tooltip:{backgroundColor:'#1e293b',titleFont:{family:'JetBrains Mono',size:11},bodyFont:{family:'DM Sans',size:11},borderColor:'#334155',borderWidth:1,cornerRadius:5,padding:8}},
  scales:{x:{grid:{color:'#1e293b'},ticks:{color:'#64748b',font:{size:9}}},
    y:{title:{display:!!yL,text:yL,color:'#64748b',font:{family:'JetBrains Mono',size:10}},grid:{color:'#1e293b'},ticks:{color:'#64748b',font:{size:9}},beginAtZero:true}}}}

boot();
</script>
</body>
</html>
