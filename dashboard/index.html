<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Argus — Satellite TE Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17; --card: #111827; --border: #1e293b;
    --text: #e2e8f0; --dim: #64748b; --muted: #475569;
    --orange: #f97316; --cyan: #22d3ee; --green: #34d399;
    --red: #f87171; --purple: #a78bfa;
    --cached: #059669; --empty: #1e293b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; }
  .mono { font-family:'JetBrains Mono',monospace; }

  .topbar {
    background:linear-gradient(135deg,#0f172a,#1e1b4b);
    border-bottom:1px solid var(--border);
    padding:14px 28px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100;
  }
  .topbar-title { font-size:20px; font-weight:700; }
  .topbar-title span { color:var(--orange); }
  .topbar-pills { display:flex; gap:24px; font-size:12px; color:var(--dim); }
  .topbar-pills .v { color:var(--text); font-weight:600; font-size:14px; }

  /* Global epoch slider */
  .epoch-bar {
    background:var(--card); border-bottom:1px solid var(--border);
    padding:12px 28px; display:flex; align-items:center; gap:16px;
    position:sticky; top:52px; z-index:99;
  }
  .epoch-bar label { font-size:12px; color:var(--dim); white-space:nowrap; }
  .epoch-bar input[type=range] { flex:1; accent-color:var(--orange); }
  .epoch-bar .ev { font-size:18px; font-weight:700; color:var(--orange); min-width:36px; text-align:center; }

  .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:20px 28px; max-width:1600px; margin:0 auto; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:18px; }
  .card h3 { font-size:12px; font-weight:600; color:var(--dim); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:14px; }
  .card-full { grid-column:1/-1; }

  .stats-row { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; grid-column:1/-1; }
  .stat-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; }
  .stat-card .l { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  .stat-card .n { font-size:28px; font-weight:700; margin-top:4px; }
  .stat-card .s { font-size:11px; color:var(--dim); margin-top:2px; }

  .chart-wrap { position:relative; height:280px; }
  .chart-wrap canvas { width:100%!important; height:100%!important; }

  .tabs { display:flex; gap:6px; margin-bottom:10px; }
  .tab {
    font-size:11px; padding:5px 12px; border-radius:5px;
    border:1px solid var(--border); background:transparent;
    color:var(--dim); cursor:pointer; transition:all .15s;
  }
  .tab.on { border-color:var(--orange); color:var(--orange); background:rgba(249,115,22,.08); }

  /* Heatmap canvas */
  .heatmap-box { position:relative; }
  #heatmap-canvas { cursor:crosshair; }
  #heatmap-tip {
    position:absolute; display:none; pointer-events:none;
    background:#1e293b; border:1px solid #334155; border-radius:6px;
    padding:6px 10px; font-size:11px; color:var(--text); white-space:nowrap; z-index:10;
  }
</style>
</head>
<body>

<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:60vh;color:var(--dim)" class="mono">Loading…</div></div>

<script>
const C = { nearest:'#f87171', g2:'#22d3ee', g10:'#34d399', sat:'#a78bfa', gnd:'#f97316' };
let D, charts={}, epoch=0, strat='greedy_2';

async function boot(){
  try{ D=await(await fetch('data.json')).json(); build(); }
  catch(e){ document.getElementById('app').innerHTML='<div style="color:#f87171;text-align:center;margin-top:40vh" class="mono">data.json not found</div>'; }
}

function build(){
  const cfg=D.config, mx=cfg.num_epochs-1;
  document.getElementById('app').innerHTML=`
  <div class="topbar">
    <div class="topbar-title mono"><span>◆</span> ARGUS</div>
    <div class="topbar-pills mono">
      <div>Epochs <span class="v">${cfg.num_epochs}</span></div>
      <div>PoPs <span class="v">${cfg.n_pops}</span></div>
      <div>Dests <span class="v">${cfg.n_dests}</span></div>
      <div>Flows <span class="v">${cfg.n_flows.toLocaleString()}</span></div>
    </div>
  </div>
  <div class="epoch-bar mono">
    <label>EPOCH</label>
    <input type="range" id="slider" min="0" max="${mx}" value="0">
    <span class="ev" id="ep-val">0</span>
  </div>
  <div class="grid">
    <div class="stats-row">
      <div class="stat-card"><div class="l mono">Epoch RTT (baseline)</div><div class="n mono" style="color:var(--red)" id="s-base">—</div></div>
      <div class="stat-card"><div class="l mono">Epoch RTT (greedy)</div><div class="n mono" style="color:var(--green)" id="s-greedy">—</div></div>
      <div class="stat-card"><div class="l mono">Improvement</div><div class="n mono" style="color:var(--cyan)" id="s-imp">—</div></div>
      <div class="stat-card"><div class="l mono">Cache Entries</div><div class="n mono" style="color:var(--purple)" id="s-cache">—</div></div>
      <div class="stat-card"><div class="l mono">PoPs Used</div><div class="n mono" style="color:var(--orange)" id="s-pops">—</div></div>
    </div>
    <div class="card"><h3>E2E Latency</h3><div class="chart-wrap"><canvas id="c-lat"></canvas></div></div>
    <div class="card"><h3>Segment Breakdown</h3><div class="tabs" id="seg-tabs"></div><div class="chart-wrap"><canvas id="c-seg"></canvas></div></div>
    <div class="card"><h3>PoP × Destination Cache</h3><div class="tabs" id="hm-tabs"></div><div class="heatmap-box"><canvas id="heatmap-canvas"></canvas><div id="heatmap-tip"></div></div></div>
    <div class="card"><h3>Per-Destination Coverage</h3><div class="chart-wrap"><canvas id="c-dest"></canvas></div></div>
  </div>`;

  mkLatency(); mkSegment(); mkDest(); drawHeatmap(); updateStats(); mkTabs();
  const sl=document.getElementById('slider'), ev=document.getElementById('ep-val');
  sl.oninput=()=>{ epoch=+sl.value; ev.textContent=epoch; onEpochChange(); };
}

function onEpochChange(){
  updateStats();
  updateLatencyMarker();
  mkSegment();
  drawHeatmap();
  updateDest();
}

function updateStats(){
  const b=D.strategies.nearest_pop?.epochs[epoch];
  const g=D.strategies[strat]?.epochs[epoch];
  if(!b||!g) return;
  document.getElementById('s-base').textContent=b.avg_rtt.toFixed(1)+'ms';
  document.getElementById('s-greedy').textContent=g.avg_rtt.toFixed(1)+'ms';
  document.getElementById('s-imp').textContent='+'+(b.avg_rtt-g.avg_rtt).toFixed(1)+'ms';
  document.getElementById('s-cache').textContent=g.gk_size;
  document.getElementById('s-pops').textContent=g.pops_used;
}

/* ── Latency chart with epoch marker ────── */
function mkLatency(){
  const ctx=document.getElementById('c-lat').getContext('2d');
  const labels=Array.from({length:D.config.num_epochs},(_,i)=>i);
  const ds=Object.keys(D.strategies).map(k=>({
    label:lbl(k), data:D.strategies[k].epochs.map(e=>e.avg_rtt),
    borderColor:clr(k), borderWidth:2, pointRadius:3, tension:.3, fill:false,
  }));
  charts.lat=new Chart(ctx,{type:'line',data:{labels,datasets:ds},
    options:{...opts('RTT (ms)',true),
      plugins:{...opts('',true).plugins,
        annotation:{annotations:{epochLine:{
          type:'line',xMin:0,xMax:0,borderColor:C.gnd+'90',borderWidth:2,borderDash:[4,4],
        }}}
      }
    }
  });
}

function updateLatencyMarker(){
  if(!charts.lat) return;
  const a=charts.lat.options.plugins.annotation.annotations.epochLine;
  a.xMin=epoch; a.xMax=epoch;
  charts.lat.update('none');
}

/* ── Segment chart ──────────────────────── */
function mkSegment(){
  const ctx=document.getElementById('c-seg').getContext('2d');
  if(charts.seg) charts.seg.destroy();
  const ep=D.strategies[strat]?.epochs||[];
  const labels=ep.map((_,i)=>i);
  charts.seg=new Chart(ctx,{type:'line',data:{labels,datasets:[
    {label:'Satellite',data:ep.map(e=>e.avg_sat),borderColor:C.sat,backgroundColor:C.sat+'30',fill:true,tension:.3,borderWidth:2,pointRadius:2},
    {label:'Ground',data:ep.map(e=>e.avg_gnd),borderColor:C.gnd,backgroundColor:C.gnd+'30',fill:true,tension:.3,borderWidth:2,pointRadius:2},
  ]},options:{...opts('RTT (ms)',true),
    plugins:{...opts('',true).plugins,
      annotation:{annotations:{epochLine:{
        type:'line',xMin:epoch,xMax:epoch,borderColor:C.gnd+'90',borderWidth:2,borderDash:[4,4],
      }}}
    }
  }});
}

/* ── Dest coverage (updates in place) ───── */
function mkDest(){
  const ctx=document.getElementById('c-dest').getContext('2d');
  const ep=D.strategies[strat]?.epochs[0];
  const cov=ep?.coverage||{};
  charts.dest=new Chart(ctx,{type:'bar',data:{
    labels:D.dest_names,
    datasets:[{label:'PoPs',data:D.dest_names.map(d=>cov[d]||0),
      backgroundColor:C.g10+'80',borderColor:C.g10,borderWidth:1,borderRadius:3}]
  },options:{...opts('PoPs cached'),indexAxis:D.dest_names.length>15?'y':'x'}});
}

function updateDest(){
  if(!charts.dest) return;
  const ep=D.strategies[strat]?.epochs[epoch];
  const cov=ep?.coverage||{};
  charts.dest.data.datasets[0].data=D.dest_names.map(d=>cov[d]||0);
  charts.dest.update('none');
}

/* ── Heatmap (canvas, no DOM rebuild) ───── */
let hmData=null;
function drawHeatmap(){
  const canvas=document.getElementById('heatmap-canvas');
  const tip=document.getElementById('heatmap-tip');
  const pops=D.pop_names, dests=D.dest_names;
  const np=pops.length, nd=dests.length;
  const padL=52, padT=4, padB=4;
  const cellW=Math.max(8,Math.min(16,Math.floor((canvas.parentElement.clientWidth-padL)/nd)));
  const cellH=Math.max(6,Math.min(14,Math.floor(380/np)));

  canvas.width=padL+nd*cellW;
  canvas.height=padT+np*cellH+padB;
  const ctx=canvas.getContext('2d');

  const matrix=D.coverage_matrix?.[strat]?.[epoch]||[];
  const cached=new Set(matrix.map(([p,d])=>`${p},${d}`));

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Pop labels
  ctx.font='9px JetBrains Mono';
  ctx.fillStyle='#475569';
  ctx.textAlign='right';
  ctx.textBaseline='middle';
  for(let pi=0;pi<np;pi++){
    ctx.fillText(pops[pi], padL-4, padT+pi*cellH+cellH/2);
  }

  // Cells
  for(let pi=0;pi<np;pi++){
    for(let di=0;di<nd;di++){
      const x=padL+di*cellW, y=padT+pi*cellH;
      ctx.fillStyle=cached.has(`${pi},${di}`)?'#059669':'#1e293b';
      ctx.fillRect(x,y,cellW-1,cellH-1);
    }
  }

  hmData={padL,padT,cellW,cellH,np,nd,pops,dests};

  // Hover tooltip
  canvas.onmousemove=(e)=>{
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const di=Math.floor((mx-padL)/cellW), pi=Math.floor((my-padT)/cellH);
    if(di>=0&&di<nd&&pi>=0&&pi<np){
      const isCached=cached.has(`${pi},${di}`);
      tip.style.display='block';
      tip.style.left=(mx+12)+'px';
      tip.style.top=(my-8)+'px';
      tip.innerHTML=`<span class="mono" style="color:${isCached?'#34d399':'#64748b'}">${isCached?'●':'○'}</span> ${pops[pi]} → ${dests[di]}`;
    } else {
      tip.style.display='none';
    }
  };
  canvas.onmouseleave=()=>{ tip.style.display='none'; };
}

/* ── Tabs ───────────────────────────────── */
function mkTabs(){
  const keys=Object.keys(D.strategies).filter(k=>k!=='nearest_pop');
  for(const id of ['seg-tabs','hm-tabs']){
    const c=document.getElementById(id); c.innerHTML='';
    keys.forEach(k=>{
      const b=document.createElement('button');
      b.className='tab mono'+(k===strat?' on':'');
      b.textContent=lbl(k);
      b.onclick=()=>{
        strat=k;
        document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.textContent===lbl(k)));
        onEpochChange();
      };
      c.appendChild(b);
    });
  }
}

/* ── Helpers ─────────────────────────────── */
function lbl(k){ return{nearest_pop:'Nearest PoP',greedy_2:'Greedy (2)',greedy_10:'Greedy (10)'}[k]||k; }
function clr(k){ if(k==='nearest_pop')return C.nearest; if(k.includes('2'))return C.g2; return C.g10; }
function opts(yL,leg=false){
  return{responsive:true,maintainAspectRatio:false,animation:{duration:0},
    plugins:{legend:{display:leg,labels:{color:'#94a3b8',font:{family:'JetBrains Mono',size:10},boxWidth:10,padding:12}},
      tooltip:{backgroundColor:'#1e293b',titleFont:{family:'JetBrains Mono',size:11},bodyFont:{family:'DM Sans',size:11},borderColor:'#334155',borderWidth:1,cornerRadius:5,padding:8}},
    scales:{x:{title:{display:true,text:'Epoch',color:'#64748b',font:{family:'JetBrains Mono',size:10}},grid:{color:'#1e293b'},ticks:{color:'#64748b',font:{size:9}}},
      y:{title:{display:!!yL,text:yL,color:'#64748b',font:{family:'JetBrains Mono',size:10}},grid:{color:'#1e293b'},ticks:{color:'#64748b',font:{size:9}},beginAtZero:true}}};
}

boot();
</script>
</body>
</html>
